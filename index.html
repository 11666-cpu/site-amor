<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pra você minha bonequinha ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* LOGIN */
#login {
  position: absolute;
  background: rgba(0,0,0,0.75);
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: rgba(0,0,0,0.4);
  padding: 30px;
  border-radius: 20px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

/* SITE */
.container {
  background: rgba(0,0,0,0.25);
  padding: 30px;
  border-radius: 20px;
  display: none;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4b6e;
  font-size: 16px;
  cursor: pointer;
}

#texto {
  margin-top: 20px;
  font-size: 22px;
  min-height: 80px;
}

.fade {
  animation: fadeIn 0.8s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}

/* corações */
.heart {
  position: absolute;
  bottom: 0;
  animation: subir 4s linear infinite;
}

@keyframes subir {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* frases */
.frase {
  position: absolute;
  bottom: 0;
  animation: subir 5s linear forwards;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Digite a senha 💌</h2>
    <p style="font-size:14px; opacity:0.8;">
      Dica: Annie é simplesmente a melhor do mundooooooooooooooooo
    </p>
    <input type="text" id="senha">
    <br><br>
    <button onclick="verificar()">Entrar</button>
    <p id="erro" style="color:red;"></p>
  </div>
</div>

<!-- SITE -->
<div class="container" id="site">
  <h2>Tenho algo pra você minha neném 💖</h2>
  <button id="btn" onclick="proximo()">Clique aqui</button>
  <div id="texto"></div>
</div>

<audio id="musica" loop>
  <source src="Waiting(MP3_160K).mp3" type="audio/mpeg">
</audio>

<script>
const senhaCorreta = "Mateus é o melhor namorado do mundo";

function verificar() {
  let senha = document.getElementById("senha").value;

  if (senha === senhaCorreta) {
    document.getElementById("login").style.display = "none";
    document.getElementById("site").style.display = "block";

    // 🎧 toca música ao entrar
    document.getElementById("musica").play();

  } else {
    document.getElementById("erro").innerText = "Senha errada, safada kdkdkkdkd";
  }
}

const mensagens = [
  "Oi, minha bonequinha ❤️",
  "Eu tava aqui pensando em você...",
  "E em como você mudou tudo pra melhor",
  "Sério, eu nunca imaginei sentir algo assim",
  "Você me faz bem de um jeito que ninguém nunca fez",
  "Cada detalhe seu me encanta 🥺",
  "Seu jeito, sua voz, seu carinho...",
  "E eu percebi uma coisa...",
  "Eu quero você comigo sempre",
  "Não importa o que aconteça",
  "Porque eu te amo...",
  "Eu te amo MUITO 💖"
];

let i = 0;

function digitar(texto, el) {
  el.innerHTML = "";
  let j = 0;
  let intervalo = setInterval(() => {
    el.innerHTML += texto[j];
    j++;
    if (j >= texto.length) clearInterval(intervalo);
  }, 35);
}

function proximo() {
  const el = document.getElementById("texto");
  const btn = document.getElementById("btn");

  if (i < mensagens.length) {
    el.classList.add("fade");
    digitar(mensagens[i], el);
    i++;

    btn.innerText = "Continuar 💌";

    if (i === mensagens.length) {
      efeitosFinais();
      btn.innerText = "Mais uma coisinha...";
    }

  } else {
    el.innerHTML = "Agora me dá um beijo... risos risos, gostosa ❤️";
    btn.style.display = "none";
  }
}

/* corações */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 4000);
}, 300);

/* frases finais */
function efeitosFinais() {
  const frases = [
    "te amo ❤️",
    "risos risos ",
    "te amo delícia ❤️",
    "minha bonequinha 💖",
    "vc é perfeita 🥺"
  ];

  setInterval(() => {
    let f = document.createElement("div");
    f.className = "frase";
    f.innerHTML = frases[Math.floor(Math.random() * frases.length)];
    f.style.left = Math.random() * 100 + "vw";
    f.style.fontSize = (16 + Math.random() * 10) + "px";

    document.body.appendChild(f);

    setTimeout(() => f.remove(), 5000);
  }, 700);
}
</script>

</body>
</html>
