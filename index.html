<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pra você minha bonequinha LINDAAAAA❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* 🔐 LOGIN */
#login {
  position: absolute;
  background: rgba(0,0,0,0.75);
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: rgba(0,0,0,0.4);
  padding: 30px;
  border-radius: 20px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

/* 💖 SITE */
.container {
  background: rgba(0,0,0,0.25);
  padding: 30px;
  border-radius: 20px;
  display: none;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4b6e;
  cursor: pointer;
}

#texto {
  margin-top: 20px;
  font-size: 22px;
  min-height: 80px;
}

/* ❤️ corações */
.heart {
  position: absolute;
  bottom: 0;
  animation: subir 4s linear infinite;
}

@keyframes subir {
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* 💬 frases */
.frase {
  position: absolute;
  bottom: 0;
  animation: subir 5s linear forwards;
}

/* 📸 fotos */
.foto {
  position: absolute;
  width: 120px;
  border-radius: 15px;
  animation: aparecer 0.5s ease;
}

@keyframes aparecer {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Digite a senha 💌</h2>
    <p style="font-size:14px; opacity:0.8;">
      Dica: Annie é simplesmente a melhor do MUNDOOOOOOOOO TE AMO TE AMO 
    </p>
    <input type="text" id="senha">
    <br><br>
    <button onclick="verificar()">Entrar</button>
    <p id="erro" style="color:red;"></p>
  </div>
</div>

<!-- 💖 SITE -->
<div class="container" id="site">
  <h2>Clique aqui 💖</h2>
  <button id="btn" onclick="proximo()">Começar</button>
  <div id="texto"></div>
</div>

<!-- 🎧 música inicial -->
<audio id="musica" loop>
  <source src="Waiting(MP3_160K).mp3" type="audio/mpeg">
</audio>

<!-- 🎶 música final -->
<audio id="musica2" loop>
  <source src="vrezia_7630106997668.mp3" type="audio/mpeg">
</audio>

<script>
const senhaCorreta = "Mateus é o melhor namorado do mundo";

function verificar() {
  if (document.getElementById("senha").value === senhaCorreta) {
    document.getElementById("login").style.display = "none";
    document.getElementById("site").style.display = "block";
    document.getElementById("musica").play();
  } else {
    document.getElementById("erro").innerText = "Senha errada 😡";
  }
}

/* 💖 textos */
const mensagens = [
  "Oi, minha bonequinha ❤️",
  "Eu tava aqui pensando em você...",
  "E sério, você é perfeita",
  "Linda, maravilhosa, incrível",
  "Você me faz feliz de um jeito inexplicável",
  "Seu sorriso é a coisa mais linda que existe",
  "Eu amo cada detalhe seu 🥺",
  "Seu jeitinho, sua voz, tudo em você",
  "Você é minha paz",
  "Minha felicidade",
  "Minha pessoa favorita no mundo",
  "Eu nunca quero te perder",
  "Porque você é única",
  "E ninguém chega perto de você",
  "Eu te amo...",
  "Eu te amo MUITOOOO 💖"
];

let i = 0;

function digitar(texto) {
  const el = document.getElementById("texto");
  el.innerHTML = "";
  let j = 0;
  let intervalo = setInterval(() => {
    el.innerHTML += texto[j];
    j++;
    if (j >= texto.length) clearInterval(intervalo);
  }, 35);
}

/* 🔉 diminuir volume */
function diminuirVolume(audio, callback) {
  let vol = audio.volume;

  let intervalo = setInterval(() => {
    if (vol > 0.05) {
      vol -= 0.05;
      audio.volume = vol;
    } else {
      clearInterval(intervalo);
      audio.pause();
      if (callback) callback();
    }
  }, 200);
}

function proximo() {
  const btn = document.getElementById("btn");

  if (i < mensagens.length) {
    digitar(mensagens[i]);
    i++;

    btn.innerText = "Continuar 💌";

    if (i === mensagens.length - 2) {
      diminuirVolume(document.getElementById("musica"));
    }

    if (i === mensagens.length) {
      diminuirVolume(document.getElementById("musica"), () => {
        let m2 = document.getElementById("musica2");
        m2.volume = 0;
        m2.play();

        let v = 0;
        let fade = setInterval(() => {
          if (v < 1) {
            v += 0.05;
            m2.volume = v;
          } else {
            clearInterval(fade);
          }
        }, 200);
      });

      chuvaDeFotos();
      efeitosFinais();
      btn.innerText = "Última mensagem...";
    }

  } else {
    document.getElementById("texto").innerHTML =
      "Agora me dá um beijo... risos risos (manda peitinho rsrs)❤️";
    btn.style.display = "none";
  }
}

/* ❤️ corações */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 4000);
}, 300);

/* 💬 frases flutuando */
function efeitosFinais() {
  const frases = [
    "te amo ❤️",
    "minha vida 💖",
    "perfeita 🥺",
    "minha bonequinha 💕",
    "vc é tudo pra mim 💘",
    "te amo delícia 😏"
  ];

  setInterval(() => {
    let f = document.createElement("div");
    f.className = "frase";
    f.innerHTML = frases[Math.floor(Math.random() * frases.length)];
    f.style.left = Math.random() * 100 + "vw";
    f.style.fontSize = (16 + Math.random() * 10) + "px";

    document.body.appendChild(f);
    setTimeout(() => f.remove(), 5000);
  }, 700);
}

/* 📸 fotos */
function chuvaDeFotos() {
  const fotos = [
    "IMG-20260418-WA0135.jpg",
    "IMG-20260419-WA0006.jpg"
  ];

  setInterval(() => {
    let img = document.createElement("img");
    img.src = fotos[Math.floor(Math.random() * fotos.length)];
    img.className = "foto";

    img.style.top = Math.random() * 90 + "vh";
    img.style.left = Math.random() * 90 + "vw";

    document.body.appendChild(img);
    setTimeout(() => img.remove(), 6000);
  }, 300);
}
</script>

</body>
</html>
